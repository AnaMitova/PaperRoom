<title>Wrapping Paper</title>
<link href="./output.css" rel="stylesheet" type="text/css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/e70ea989f6.js" crossorigin="anonymous"></script>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="cart.js"></script>
<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQrDhXfovACSnWY8xRPxY92IP31LY05gOs81D2DTjXKKRRMSczI3VN_l4-c9b_kd8J6HLhG96x0xtpb/pub?output=csv"
async function loadProducts(){

const response = await fetch(sheetURL)
const data = await response.text()

const rows = data.split("\n").slice(1)

const container = document.querySelector(".grid")

rows.forEach(row => {

const [id,name,category,price,length,image] = row.split(",").map(v => v.trim())

const product = `
<div class="relative rounded-xl hover:cursor-pointer hover:scale-110 duration-150 overflow-hidden shadow-lg group">

<img 
src="${image}"
onclick="openModal('${image}','${name}','${price}','${length}')"
class="w-full h-80 object-cover  transition duration-500 cursor-pointer"
/>

<div class="absolute bottom-0 p-6 text-white flex flex-col -space-y-1">

<p class="text-[12px] opacity-90">Димензии: ${length}</p>
<p class="text-[19px] font-semibold ">${price}ден.</p>
<h3 class="text-lg font-semibold pb-2">${name}</h3>

<button onclick="addToCart('${name}',${price})"
class="bg-[#c793ab] px-3 w-[100px] py-1 rounded hover:bg-[#b77f97] transition">
Додади
</button>

</div>
</div>
`

container.innerHTML += product

})

}

loadProducts()
</script>

</head>

<div class="grid md:grid-cols-3 gap-8">

<!-- JAVA SCRIPT -->
<script>
function openModal(src, name, price, length) {
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("modalImg");
    const modalName = document.getElementById("modalName");
    const modalPrice = document.getElementById("modalPrice");
    const modalLength = document.getElementById("modalLength");

    modalImg.src = src;
    modalName.textContent = name;
    modalPrice.textContent = price + " ден.";
    modalLength.textContent = length;

    modal.classList.remove("hidden");
}

function closeModal() {
    const modal = document.getElementById("imageModal");
    modal.classList.add("hidden");
}

// Wait until DOM loads
document.addEventListener("DOMContentLoaded", function() {
    const modal = document.getElementById("imageModal");

    modal.addEventListener("click", function(e) {
        if (e.target === modal) {
            closeModal();
        }
    });
});
</script>
<!-- IMAGE MODAL -->
<div id="imageModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">

<div class="bg-white -mr-8 rounded-xl flex overflow-hidden shadow-2xl">

<img id="modalImg" class="w-[780px]  object-cover"/>

</div>

<div class="p-4 flex flex-col justify-center  w-52 -ml-28 -mt-72 bg-white rounded-xl">

<h3 id="modalName" class="text-lg  text-gray-800"></h3>
<h3 id="modalLength" class="text-sm  text-gray-800"></h3>

<p id="modalPrice" class="text-xl pt-2 text-[#c793ab] font-semibold"></p>

<button onclick="addToCart('${name}','${price}')"
class="bg-[#c793ab] px-3 w-[100px] py-1 rounded text-white self-end mt-2 hover:bg-[#b77f97] transition">
Додади
</button>


</div>

</div>
<script>
const menuBtn = document.getElementById("menu-btn");
const closeBtn = document.getElementById("close-menu");
const mobileMenu = document.getElementById("mobile-menu");

menuBtn.addEventListener("click", () => {
mobileMenu.classList.remove("-translate-y-full");
mobileMenu.classList.add("translate-y-0");
});

closeBtn.addEventListener("click", () => {
mobileMenu.classList.remove("translate-y-0");
mobileMenu.classList.add("-translate-y-full");
});

</script>
