<a href="#top"
   id="backToTop"
   class="fixed bottom-6 right-6 z-[9999]
          w-12 h-12 flex justify-center items-center
          bg-white text-[#ba7f9c] rounded-full
          shadow-[0_0_8px_rgba(0,0,0,0.25)]
          hover:scale-110
          transition-all duration-300
          opacity-0 pointer-events-none">
  <i class="fa-solid fa-arrow-up text-xl"></i>
</a>
<script>
  const backToTop = document.getElementById("backToTop");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 300) {
      backToTop.classList.remove("opacity-0", "pointer-events-none");
      backToTop.classList.add("opacity-100");
    } else {
      backToTop.classList.add("opacity-0", "pointer-events-none");
      backToTop.classList.remove("opacity-100");
    }
  });
</script>
<body class="bg-gray-50">

Вкупно: <span id="cart-total"></span> ден.
</h3>

<div class="mt-8 space-y-4">

<input id="name" placeholder="Име"
class="border p-2 w-full"/>

<input id="phone" placeholder="Телефон"
class="border p-2 w-full"/>

<input id="address" placeholder="Адреса"
class="border p-2 w-full"/>


<!-- PAYMENT -->
<div class="space-y-2 mt-4">
<p class="font-semibold text-[#424b54]">Начин на плаќање</p>

<label class="flex items-center space-x-2">
<input type="radio" name="payment" value="cash" checked>
<span>Плаќање при достава</span>
</label>

<label class="flex items-center space-x-2">
<input type="radio" name="payment" value="card">
<span>Онлајн плаќање (картичка)</span>
</label>

<div class="flex space-x-2">
<button onclick="sendOrder()"
class="bg-[#ba7f9c] text-white px-6 py-3 rounded">
Нарачај
</button>
<p id="order-message" class="text-[#424b54] text-lg font-semibold mt-4 hidden">
Нарачката е успешно испратена. Ќе ве контактираме наскоро.
</p>    
</div>


</div>

<script>
displayCart()
</script>
<script>
const menuBtn = document.getElementById("menu-btn");
const closeBtn = document.getElementById("close-menu");
const mobileMenu = document.getElementById("mobile-menu");

menuBtn.addEventListener("click", () => {
mobileMenu.classList.remove("-translate-y-full");
mobileMenu.classList.add("translate-y-0");
});

closeBtn.addEventListener("click", () => {
mobileMenu.classList.remove("translate-y-0");
mobileMenu.classList.add("-translate-y-full");
});

</script>
<script>
function sendOrder(){

let name = document.getElementById("name").value.trim()
let phone = document.getElementById("phone").value.trim()
let address = document.getElementById("address").value.trim()

let payment = document.querySelector('input[name="payment"]:checked').value

let cart = JSON.parse(localStorage.getItem("cart")) || []

let message = document.getElementById("order-message")

/* VALIDATION */

if(name === "" || phone === "" || address === ""){
message.textContent = "Ве молиме пополнете ги сите полиња."
message.classList.remove("hidden")
message.classList.add("text-gray-600")
return
}

if(cart.length === 0){
message.textContent = "Вашата кошничка е празна."
message.classList.remove("hidden")
message.classList.add("text-gray-600")
return
}

/* ORDER DATA */

let products = cart.map(p => p.name).join(", ")
let total = document.getElementById("cart-total").innerText

fetch("https://script.google.com/macros/s/AKfycbwfe7prRpOpAq2pHGvCGBHLiPgGqt-1fqwP0B7CUJ9pypbj1g00Yu-EcJhhCj7yrEV6hw/exec", {
method: "POST",
body: JSON.stringify({
name: name,
phone: phone,
address: address,
payment: payment,
products: products,
total: total
})
})

/* PAYMENT LOGIC */

if(payment === "card"){

message.textContent = "Пренасочување кон плаќање..."
message.classList.remove("hidden")
message.classList.remove("text-gray-600")
message.classList.add("text-gray-600")

setTimeout(()=>{
window.location.href = "https://your-stopanska-payment-link"
},1500)

}
else{

message.textContent = "Нарачката е успешно испратена. Ќе ве контактираме наскоро."
message.classList.remove("hidden")
message.classList.remove("text-gray-600")
message.classList.add("text-gray-600")

/* CLEAR CART */

localStorage.removeItem("cart")

/* UPDATE PAGE */

document.getElementById("cart-items").innerHTML = ""
document.getElementById("cart-total").innerText = "0"
document.getElementById("cart-count").innerText = "0"

}

}
</script>
</body>
